# Safe restore template: no credentials. Merge into the config generated by `hermes setup`.
model:
  default: cx/gpt-5.6-terra-review
  provider: custom
  base_url: http://127.0.0.1:20128/v1
  openai_runtime: codex_app_server
  codex_model: cx/gpt-5.6-terra-review
  codex_reasoning_effort: medium
fallback_providers: []
toolsets:
- hermes-cli
agent:
  confirmation_gate: true
  max_turns: 60
  gateway_timeout: 1800
  restart_drain_timeout: 180
  reasoning_effort: medium
approvals:
  mode: manual
